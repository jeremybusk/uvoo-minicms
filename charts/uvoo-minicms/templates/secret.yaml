{{- if not .Values.admin.existingSecret }}
{{- $secretName := include "uvoo-minicms.adminSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := .Values.admin.password -}}
{{- if and (eq $password "") $existing -}}
{{- $password = index $existing.data .Values.admin.passwordKey | b64dec -}}
{{- else if eq $password "" -}}
{{- $password = randAlphaNum 32 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "uvoo-minicms.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.admin.usernameKey }}: {{ .Values.admin.username | b64enc | quote }}
  {{ .Values.admin.passwordKey }}: {{ $password | b64enc | quote }}
{{- end }}
