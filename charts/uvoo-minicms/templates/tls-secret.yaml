{{- if and .Values.ingress.enabled .Values.ingress.tls.enabled .Values.ingress.tls.crt .Values.ingress.tls.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "uvoo-minicms.tlsSecretName" . }}
  labels:
    {{- include "uvoo-minicms.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.ingress.tls.crt | b64enc | quote }}
  tls.key: {{ .Values.ingress.tls.key | b64enc | quote }}
{{- end }}
