services:
  uvoo-minicms:
    image: ${CMS_IMAGE:-ghcr.io/jeremybusk/uvoo-minicms:latest}
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      CMS_DATA_DIR: /data
      CMS_DB: /data/cms.db
      CMS_UPLOAD_DIR: /data/uploads
      CMS_WEB_ROOT: /app/web/dist
    volumes:
      - ./data:/data
      # Optional MaxMind DB:
      # - ./GeoLite2-Country.mmdb:/app/GeoLite2-Country.mmdb:ro
