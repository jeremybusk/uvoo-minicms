name: uvoo-minicms
arch: ${GOARCH}
platform: linux
version: ${VERSION}
section: web
priority: optional
maintainer: Uvoo <support@uvoo.io>
description: Small SQLite-backed CMS with a Go backend and React admin UI.
homepage: https://github.com/uvoo/uvoo-minicms
license: MIT
contents:
  - src: ./bin/uvoo-minicms
    dst: /usr/bin/uvoo-minicms
    file_info:
      mode: 0755
  - src: ./web/dist
    dst: /usr/share/uvoo-minicms/web/dist
    type: tree
  - src: ./packaging/uvoo-minicms.env
    dst: /etc/uvoo-minicms/uvoo-minicms.env
    type: config
    file_info:
      mode: 0640
  - src: ./packaging/uvoo-minicms.service
    dst: /usr/lib/systemd/system/uvoo-minicms.service
    file_info:
      mode: 0644
scripts:
  preinstall: ./packaging/scripts/preinstall.sh
  postinstall: ./packaging/scripts/postinstall.sh
  preremove: ./packaging/scripts/preremove.sh
  postremove: ./packaging/scripts/postremove.sh
