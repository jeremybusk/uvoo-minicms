syntax = "proto3";

package cms.v1;

import "google/protobuf/struct.proto";

service CMSService {
  rpc Health(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc ListPages(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc GetPage(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc SavePage(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc DeletePage(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc GetSettings(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc SaveSettings(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc ListAssets(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc UploadFile(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc GetACL(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc SaveACL(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc ImportPreview(google.protobuf.Struct) returns (google.protobuf.Struct);
  rpc ImportSite(google.protobuf.Struct) returns (google.protobuf.Struct);
}
